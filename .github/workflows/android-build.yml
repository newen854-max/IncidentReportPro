name: Build Android APK (EAS)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Install EAS CLI
        run: npm install -g eas-cli expo-cli

      - name: Login check
        run: echo "Starting EAS build..."

      - name: Build Android APK using EAS
        run: eas build -p android --profile preview --non-interactive
