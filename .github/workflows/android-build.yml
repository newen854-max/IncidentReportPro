name: Build Android APK (EAS)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Install EAS CLI
        run: npm install -g eas-cli expo-cli

      - name: Set Expo token directly
        run: |
          echo "EXPO_TOKEN=expo_dummy_token_for_now" >> $GITHUB_ENV

      - name: Build Android APK using EAS
        env:
          EXPO_TOKEN: expo_dummy_token_for_now
        run: eas build -p android --profile preview --non-interactive
